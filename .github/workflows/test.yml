name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hagi
          POSTGRES_PASSWORD: hagi
          POSTGRES_DB: hagi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hagi:hagi@localhost:5432/hagi_test
      NEXT_PUBLIC_APP_URL: http://localhost:3002
      TAX_MODE: small_business
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Schema to test DB
        run: npx prisma db push --skip-generate

      - name: Run Vitest
        run: npm test
